on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v4
      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build bison
      - name: setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
      - name: configure
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build-cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
      - name: build
        env:
          CC: gcc
          CXX: g++
        run: cmake --build build-cmake -j
      - name: package
        run: |
          mkdir -p dist
          cp build-cmake/aria2c dist/aria2c-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: aria2c-linux-${{ github.run_id }}
          path: dist/*

  update-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-linux]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aria2c-linux-${{ github.run_id }}
          path: dist
      - name: list file
        run: ls -R dist
      - name: update
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && github.ref_name != 'v0.0.0'
        with:
          files: |
            dist/*
